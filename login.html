<!DOCTYPE html>
<html>
<head>
  <title>Baaki Hai - Login</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .google {
      background: #000;
      color: white;
    }

    .phone {
      background: #ddd;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Welcome to Baaki Hai</h2>

  <button class="google" onclick="googleLogin()">Continue with Google</button>

  <button class="phone" onclick="phoneLogin()">Continue with Phone</button>
</div>

<script>
function googleLogin() {
  // 🔥 simulate google login
  const user = {
    name: "Priyasree",
    exam: "upsc"
  };

  sessionStorage.setItem("bh_user", JSON.stringify(user));

  window.location.href = "/index.html";
}

function phoneLogin() {
  const name = prompt("Enter your name");

  if (!name) return;

  sessionStorage.setItem("bh_user", JSON.stringify({
    name: name,
    exam: "upsc"
  }));

  window.location.href = "/index.html";
}
</script>

</body>
</html>
