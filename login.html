<!DOCTYPE html>
<html>
<head>
  <title>Baaki Hai - Login</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .google {
      background: #000;
      color: white;
    }

    .phone {
      background: #ddd;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Welcome to Baaki Hai</h2>

  <button class="google" onclick="googleLogin()">Continue with Google</button>

  <button class="phone" onclick="phoneLogin()">Continue with Phone</button>
</div>

<script>
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then((result) => {
      const user = result.user;

      // store user
      sessionStorage.setItem("bh_user", JSON.stringify({
        name: user.displayName,
        email: user.email
      }));

      window.location.href = "/index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
}
  function phoneLogin() {
  const phoneNumber = document.getElementById("phone").value;

  firebase.auth().signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
    .then((confirmationResult) => {
      const code = prompt("Enter OTP");

      return confirmationResult.confirm(code);
    })
    .then((result) => {
      const user = result.user;

      sessionStorage.setItem("bh_user", JSON.stringify({
        name: "User", // phone login doesn’t give name
        phone: user.phoneNumber
      }));

      window.location.href = "/index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
}
</script>

</body>
</html>
